<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LUI Agent Demo</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; padding: 24px; background: #f7f8fc; color: #1a1f2b; }
      .container { max-width: 900px; margin: auto; background: white; border-radius: 16px; padding: 24px; box-shadow: 0 18px 48px rgba(0,0,0,0.08); }
      h1 { margin-bottom: 8px; }
      section { margin-bottom: 24px; }
      label { display: block; margin-top: 12px; font-weight: 600; }
      input, textarea, button, select { width: 100%; padding: 10px 12px; margin-top: 6px; border-radius: 10px; border: 1px solid #d8d8e5; font-size: 14px; }
      button { background: #2563eb; color: white; border: none; cursor: pointer; transition: background 0.2s ease; }
      button:hover { background: #1d4ed8; }
      pre { background: #f3f4f6; padding: 16px; border-radius: 12px; overflow-x: auto; }
      .row { display: grid; gap: 24px; grid-template-columns: 1fr 1fr; }
      .full { grid-column: 1 / -1; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>LUI Agent Demo</h1>
      <p>通过前端页面模拟 MCP 与 iMessage 查询，并展示主动推送结果。</p>

      <section>
        <h2>被动响应：MCP / iMessage 查询</h2>
        <div class="row">
          <div>
            <label for="entryType">入口类型</label>
            <select id="entryType">
              <option value="mcp">MCP</option>
              <option value="imessage">iMessage</option>
            </select>
          </div>
          <div>
            <label for="userId">用户 ID</label>
            <input id="userId" value="user-1" />
          </div>
          <div>
            <label for="locationLabel">位置标签</label>
            <input id="locationLabel" value="王府井" />
          </div>
          <div>
            <label for="query">查询内容</label>
            <input id="query" value="附近的酒吧" />
          </div>
          <div class="full">
            <button id="sendQuery">发送查询</button>
          </div>
        </div>
      </section>

      <section>
        <h2>主动推送</h2>
        <div class="row">
          <div>
            <label for="pushUserId">用户 ID</label>
            <input id="pushUserId" value="user-1" />
          </div>
          <div class="full">
            <button id="sendPush">获取主动推送</button>
          </div>
        </div>
      </section>

      <section>
        <h2>结果</h2>
        <pre id="result">请先发送请求。</pre>
      </section>
    </div>

    <script>
      const result = document.getElementById('result');
      const entryType = document.getElementById('entryType');
      const userId = document.getElementById('userId');
      const locationLabel = document.getElementById('locationLabel');
      const query = document.getElementById('query');
      const pushUserId = document.getElementById('pushUserId');

      const formatJson = (data) => JSON.stringify(data, null, 2);

      document.getElementById('sendQuery').addEventListener('click', async () => {
        const payload = {
          userId: userId.value,
          location: { lat: 39.9042, lng: 116.4074, label: locationLabel.value },
          query: query.value,
        };
        const endpoint = entryType.value === 'mcp' ? '/mcp/query' : '/imessage/query';
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await response.json();
        result.textContent = formatJson(data);
      });

      document.getElementById('sendPush').addEventListener('click', async () => {
        const response = await fetch(`/agent/push/${pushUserId.value}`);
        const data = await response.json();
        result.textContent = formatJson(data);
      });
    </script>
  </body>
</html>
